name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
            artifact_name: srcds_win64_console.exe
          - target: i686-pc-windows-msvc
            arch: x86
            artifact_name: srcds_console.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: pwsh
        run: Copy-Item "target\${{ matrix.target }}\release\srcds_console.exe" "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/srcds_console.exe/srcds_console.exe
            artifacts/srcds_win64_console.exe/srcds_win64_console.exe
          generate_release_notes: true
          body: |
            ## SRCDS Console Launcher

            Drop-in replacement for SRCDS that runs inside your existing terminal.

            ### Download
            - **`srcds_console.exe`** — for 32-bit SRCDS (standard branch)
            - **`srcds_win64_console.exe`** — for 64-bit SRCDS (x86-64 beta branch)

            Place the appropriate file in your SRCDS game root (next to `srcds.exe`), then run it with the same arguments.
